[groups.core]
members = [
  "core_runtime",
  "core_shell",
  "core_fs_commands",
  "app_com",
  "app_edit",
  "app_less",
  "service_wifi",
  "service_ble",
  "service_sd",
  "service_audio",
  "service_resources",
  "service_engines",
  "service_vector",
  "service_gpio",
  "service_onewire",
  "service_logic",
  "service_i2c",
  "service_spi",
  "service_expansion",
  "service_radio",
  "expansion_rfm69",
  "expansion_pcd8544",
  "service_json",
  "service_crypto",
  "service_uart",
  "service_battery",
  "service_rtc",
  "service_sensors",
  "service_adc",
  "service_pwm",
  "service_buttons",
  "service_joystick",
  "service_adc_dpad",
  "job_bridge",
  "job_log",
  "job_batmon",
  "job_daq",
  "job_sump",
]

[groups.audio]
members = ["service_audio", "app_aplay", "app_arecord"]
triggers = ["app_aplay", "app_arecord"]

[groups.net]
capabilities = ["wifi"]
members = [
  "service_wifi",
  "app_ssh",
  "app_scp",
  "app_curl",
  "app_telnet",
  "app_web",
  "app_chat",
  "job_httpd",
  "job_chatd",
  "job_slip",
  "job_ntp_sync",
]
triggers = [
  "app_ssh",
  "app_scp",
  "app_curl",
  "app_telnet",
  "app_web",
  "app_chat",
  "job_httpd",
  "job_chatd",
  "job_slip",
  "job_ntp_sync",
]
sources = [
  "shell/solar_os_shell_mqtt.c",
  "services/solar_os_chat.c",
  "services/solar_os_mqtt.c",
  "services/solar_os_net.c",
  "services/solar_os_scp.c",
  "services/solar_os_ssh.c",
  "services/solar_os_ssh_keys.c",
  "services/solar_os_ssh_transport.c",
]
requires = [
  "esp-tls",
  "esp_http_client",
  "esp_http_server",
  "lwip",
  "mbedtls",
  "mqtt",
  "stb_image",
  "webp_decoder",
]

[groups.media]
members = ["app_view"]
triggers = ["app_view"]
capabilities = ["gfx"]

[groups.games]
members = ["app_invaders"]
triggers = ["app_invaders"]
capabilities = ["gfx"]

[groups.python]
members = ["app_python"]
triggers = ["app_python"]

[groups.lua]
members = ["app_lua"]
triggers = ["app_lua"]

[groups.utils]
members = [
  "app_clock",
  "app_reader",
  "app_files",
  "app_notes",
  "app_plot",
  "app_logic",
  "app_sheet",
]
triggers = [
  "app_clock",
  "app_reader",
  "app_files",
  "app_notes",
  "app_plot",
  "app_logic",
  "app_sheet",
]

[packages.core_runtime]
label = "core.runtime"
sources = [
  "main.c",
