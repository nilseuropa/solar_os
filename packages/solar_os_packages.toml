[packages.core_shell]
label = "core.shell"
sources = [
  "apps/solar_os_shell.c",
  "shell/solar_os_shell_common.c",
  "shell/solar_os_shell_commands.c",
  "shell/solar_os_shell_daq.c",
  "shell/solar_os_shell_hardware.c",
  "shell/solar_os_shell_io.c",
  "shell/solar_os_shell_setterm_tui.c",
  "shell/solar_os_shell_system.c",
