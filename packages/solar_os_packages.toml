[groups.bootstrap]
immutable = true
members = ["core_runtime", "core_shell"]

[groups.system]
members = [
  "system_shell",
  "service_wifi",
  "service_ble",
  "service_sd",
  "service_audio",
  "service_resources",
  "service_engines",
  "service_vector",
  "service_gpio",
  "service_onewire",
  "service_logic",
  "service_i2c",
  "service_spi",
  "service_json",
  "service_crypto",
  "service_uart",
  "service_battery",
  "service_rtc",
  "service_sensors",
  "service_adc",
  "service_pwm",
  "service_buttons",
  "service_joystick",
  "service_adc_dpad",
]

[groups.expansions]
members = [
  "service_expansion",
  "service_radio",
  "expansion_rfm69",
  "expansion_pcd8544",
  "expansion_ssd1306",
  "job_pocsag",
]

[groups.maintenance_apps]
members = [
  "service_ota",
  "core_fs_commands",
  "app_inbox",
  "app_com",
  "app_edit",
  "app_less",
  "app_io",
]

[groups.maintenance_jobs]
members = [
  "job_bridge",
  "job_log",
  "job_batmon",
  "job_daq",
  "job_sump",
]

[groups.audio]
members = ["service_audio", "app_aplay", "app_arecord"]
triggers = ["app_aplay", "app_arecord"]

[groups.net]
capabilities = ["wifi"]
members = [
  "service_wifi",
  "service_net",
  "service_mqtt",
  "service_ssh",
  "service_mail",
  "service_chat",
  "service_http_client",
  "service_http_server",
  "app_ssh",
  "app_scp",
  "app_curl",
  "app_telnet",
  "app_web",
  "app_chat",
  "app_email",
  "job_httpd",
  "job_chatd",
  "job_email_sync",
  "job_slip",
  "job_ntp_sync",
]
triggers = [
  "app_ssh",
  "app_scp",
  "app_curl",
  "app_telnet",
  "app_web",
  "app_chat",
  "app_email",
  "job_httpd",
  "job_chatd",
  "job_email_sync",
  "job_slip",
  "job_ntp_sync",
]

[groups.media]
members = ["app_view"]
triggers = ["app_view"]
capabilities = ["gfx"]

[groups.games]
members = ["app_invaders"]
triggers = ["app_invaders"]
capabilities = ["gfx"]

[groups.python]
members = ["app_python"]
triggers = ["app_python"]

[groups.lua]
members = ["app_lua"]
triggers = ["app_lua"]

[groups.utils]
members = [
  "app_clock",
  "app_reader",
  "app_files",
  "app_notes",
  "app_plot",
  "app_logic",
  "app_sheet",
]
triggers = [
  "app_clock",
  "app_reader",
  "app_files",
  "app_notes",
  "app_plot",
  "app_logic",
  "app_sheet",
]

[packages.core_runtime]
label = "bootstrap.runtime"
sources = [
  "main.c",
  "solar_os.c",
  "solar_os_jobs.c",
  "solar_os_scheduler.c",
  "solar_os_task.c",
  "drivers/flash_storage.c",
  "apps/solar_os_app_registry.c",
  "jobs/solar_os_job_registry.c",
  "services/solar_os_board_caps.c",
  "services/solar_os_cdc.c",
  "services/solar_os_clipboard.c",
  "services/solar_os_display.c",
  "services/solar_os_gfx.c",
  "services/solar_os_identity.c",
  "services/solar_os_log.c",
  "services/solar_os_memory.c",
  "services/solar_os_port.c",
  "services/solar_os_port_shell.c",
  "services/solar_os_power.c",
  "services/solar_os_ramfs.c",
  "services/solar_os_sessions.c",
  "services/solar_os_splash.c",
  "services/solar_os_storage.c",
  "services/solar_os_stream.c",
  "services/solar_os_terminal.c",
  "services/solar_os_time.c",
  "services/solar_os_tui.c",
]
requires = [
  "esp_driver_gpio",
  "esp_driver_usb_serial_jtag",
  "esp_event",
  "esp_pm",
  "esp_rom",
  "esp_timer",
  "fatfs",
  "heap",
  "nvs_flash",
  "u8g2",
  "wear_levelling",
]

[packages.service_ota]
label = "maintenance.ota"
depends = ["service_crypto", "service_json", "service_wifi"]
sources = ["services/solar_os_ota.c"]
requires = [
  "app_update",
  "esp-tls",
  "esp_http_client",
  "esp_https_ota",
]
capabilities = ["wifi"]

[packages.core_shell]
label = "bootstrap.shell"
sources = [
  "apps/solar_os_shell.c",
  "shell/solar_os_shell_common.c",
  "shell/solar_os_shell_commands.c",
  "shell/solar_os_shell_io.c",
  "shell/solar_os_shell_setterm_tui.c",
  "shell/solar_os_shell_system.c",
  "shell/solar_os_vt100.c",
  "services/solar_os_transfer.c",
  "services/solar_os_zmodem.c",
]

[packages.system_shell]
label = "system.shell"
sources = ["shell/solar_os_shell_hardware.c"]

[packages.service_inbox]
label = "service.inbox"
sources = ["services/solar_os_inbox.c"]
requires = ["esp_timer", "heap"]

[packages.core_fs_commands]
label = "core.fs-commands"
sources = [
  "shell/solar_os_shell_fs.c",
  "services/solar_os_zip.c",
]

[packages.service_wifi]
label = "service.wifi"
sources = [
  "services/solar_os_wifi.c",
  "shell/solar_os_shell_network.c",
  "shell/solar_os_shell_wifi_tui.c",
]
requires = ["esp_event", "esp_netif", "esp_wifi", "lwip", "nvs_flash"]
capabilities = ["wifi"]

[packages.service_net]
label = "network.base"
depends = ["service_wifi"]
sources = ["services/solar_os_net.c"]
requires = ["lwip"]
capabilities = ["wifi"]

[packages.service_mqtt]
label = "network.mqtt"
depends = ["service_wifi"]
sources = [
  "services/solar_os_mqtt.c",
  "shell/solar_os_shell_mqtt.c",
]
requires = ["esp-tls", "mqtt"]
capabilities = ["wifi"]

[packages.service_ssh]
label = "network.ssh"
depends = ["service_crypto", "service_wifi"]
sources = [
  "services/solar_os_scp.c",
  "services/solar_os_ssh.c",
  "services/solar_os_ssh_keys.c",
  "services/solar_os_ssh_transport.c",
]
requires = ["esp-tls", "mbedtls"]
capabilities = ["wifi"]

[packages.service_mail]
label = "network.mail"
depends = ["service_inbox", "service_wifi"]
sources = ["services/solar_os_email.c"]
requires = ["esp-tls", "heap"]
capabilities = ["wifi"]

[packages.service_chat]
label = "network.chat"
depends = ["service_wifi"]
sources = ["services/solar_os_chat.c"]
requires = ["esp-tls"]
capabilities = ["wifi"]

[packages.service_http_client]
label = "network.http-client"
depends = ["service_wifi"]
requires = ["esp_http_client"]
capabilities = ["wifi"]

[packages.service_http_server]
label = "network.http-server"
depends = ["service_wifi"]
requires = ["esp_http_server"]
capabilities = ["wifi"]

[packages.service_image]
label = "media.image"
requires = ["stb_image", "webp_decoder"]

[packages.service_document]
label = "media.document"
depends = ["service_image"]
sources = [
  "services/solar_os_doc.c",
  "services/solar_os_html.c",
  "services/solar_os_xml.c",
]

[packages.service_ble]
label = "service.ble"
sources = ["services/solar_os_ble_keyboard.c"]
requires = ["bt", "esp_hid", "nvs_flash"]
capabilities = ["ble"]

[packages.service_sd]
label = "service.sd"
capabilities = ["sd"]

[packages.service_audio]
label = "service.audio"
sources = ["services/solar_os_audio.c"]
requires = ["esp_codec_dev", "esp_driver_i2s", "minimp3"]
capabilities = ["audio"]

[packages.service_resources]
label = "service.resources"
sources = [
  "drivers/routed_spi_bus.c",
  "services/solar_os_buses.c",
  "services/solar_os_resources.c",
  "services/solar_os_pins.c",
]
requires = ["esp_driver_gpio", "esp_driver_spi"]

[packages.service_engines]
label = "service.engines"
sources = ["services/solar_os_engines.c"]
requires = ["esp_timer"]

[packages.service_vector]
label = "service.vector"
sources = ["services/solar_os_vector.c"]

[packages.service_gpio]
label = "service.gpio"
sources = ["services/solar_os_gpio.c", "services/solar_os_status_led.c"]
