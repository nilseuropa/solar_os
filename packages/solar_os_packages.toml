  "services/solar_os_expansion.c",
  "shell/solar_os_shell_expansion.c",
]
any_capabilities = [
  "expansion_gpio",
  "expansion_i2c",
  "expansion_spi",
  "expansion_uart",
  "expansion_adc",
  "expansion_pwm",
]

[packages.service_radio]
label = "service.radio"
sources = [
  "services/solar_os_radio.c",
  "shell/solar_os_shell_radio.c",
  "shell/solar_os_shell_radio_tui.c",
]
any_capabilities = [
  "expansion_gpio",
  "expansion_spi",
  "expansion_uart",
]

