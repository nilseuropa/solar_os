capabilities = ["gpio"]

[packages.service_onewire]
label = "service.onewire"
sources = ["services/solar_os_onewire.c"]
requires = ["onewire_bus"]
capabilities = ["gpio"]

[packages.service_logic]
label = "service.logic"
sources = ["services/solar_os_logic.c"]
requires = ["esp_driver_gpio", "esp_hw_support", "esp_timer", "heap"]
